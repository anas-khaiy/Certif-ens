spring.application.name=formateur-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/certif_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret (Should be the same to allow cross-service session if needed, but usually services have their own. 
# However, for a single DB and potentially shared users, keeping it consistent or having its own is fine.
# I'll use the same for now to stay consistent with the user's project setup if they want shared auth)
jwt.secret=9a615631cd197629b35bc20c586111f185799c96191c96443685c7031201047d
jwt.expiration=86400000

# Multipart configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-post-size=20MB

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
# Error handling
server.error.include-message=always
