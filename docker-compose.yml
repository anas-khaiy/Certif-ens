services:
  # Base de données PostgreSQL partagée par les 3 backends Spring Boot
  postgres:
    image: postgres:15-alpine
    container_name: certiflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: certif_db
    ports:
      - "5432:5432"
    volumes:
      - certificate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Administrateur
  backend-admin:
    build: 
      context: ./Backend-Admin
    container_name: certiflow-backend-admin
    ports:
      - "9091:9091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/certif_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - certif_uploads_data:/app/uploads

  # Backend Formateur
  backend-formateur:
    build: 
      context: ./Backend-Formateur
    container_name: certiflow-backend-formateur
    ports:
      - "9092:9092"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/certif_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
      - LIVEKIT_HOST=http://livekit:7880
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - certif_uploads_data:/app/uploads

  # Backend Apprenant
  # ... (backend-apprenant config) ...
  backend-apprenant:
    build: 
      context: ./Backend-Apprenant
    container_name: certiflow-backend-apprenant
    ports:
      - "9093:9093"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/certif_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - certif_uploads_data:/app/uploads

  # Microservice IA (Python)
  ai-detection-service:
    build: 
      context: ./AI-Detection-Service
    container_name: certiflow-ai-service
    ports:
      - "8000:8000"

  # Ollama LLM (Mistral 7B)
  ollama:
    image: ollama/ollama:latest
    container_name: certiflow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_CTX=2048        # Reduce context window to save RAM
      - OLLAMA_MAX_LOADED_MODELS=1 # Only keep 1 model loaded at a time
    deploy:
      resources:
        limits:
          memory: 10G               # Increased for Qwen2.5 7B
        reservations:
          memory: 6G

  # SERVICE D'INSTALLATION AUTOMATIQUE DU MODÈLE
  # Ce service s'exécute, vérifie que Ollama est là, tire le modèle, puis s'arrête.
  ollama-model-installer:
    image: alpine:latest
    container_name: certiflow-ollama-installer
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "apk add --no-cache curl && \
      echo 'Attente du démarrage d Ollama...' && \
      sleep 10 && \
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral\"}' && \
      echo 'Modèle Mistral installé !' && \
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:7b\"}' && \
      echo 'Modèle Qwen 2.5 installé !' && \
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}' && \
      echo 'Modèle Llama 3.2 (3B) installé !';"

  # Frontend Administrateur
  service-admin:
    build: 
      context: ./Service Admin
    container_name: certiflow-frontend-admin
    ports:
      - "6173:6173"

  # Frontend Formateur
  service-formateur:
    build: 
      context: ./Service Formateur
    container_name: certiflow-frontend-formateur
    ports:
      - "6174:6174"

  # Frontend Apprenant
  service-apprenant:
    build: 
      context: ./Service Apprenant
    container_name: certiflow-frontend-apprenant
    ports:
      - "6175:6175"

  # Backend Coordinateur
  backend-coordinateur:
    build: 
      context: ./Backend-Coordinateur
    container_name: certiflow-backend-coordinateur
    ports:
      - "9094:9094"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/certif_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - certif_uploads_data:/app/uploads

  # Frontend Coordinateur
  service-coordinateur:
    build: 
      context: ./Service Coordinateur
    container_name: certiflow-frontend-coordinateur
    ports:
      - "6176:6176"

  # LiveKit Server (Video Conferencing / Google Meet alternative)
  livekit:
    image: livekit/livekit-server:latest
    container_name: certiflow-livekit
    command: ["--config", "/etc/livekit.yaml", "--node-ip=127.0.0.1"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - "LIVEKIT_KEYS=devkey: devsecret32charslongtofitrequirement"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: certiflow-nginx
    ports:
      - "80:80"
      - "81:81"
      - "82:82"
      - "83:83"
      - "84:84"
      - "85:85"
      - "86:86"
      - "89:89"
      - "88:88"
    volumes:
      - ./nginx/certiflow.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - service-admin
      - service-formateur
      - service-apprenant
      - service-coordinateur
      - backend-admin
      - backend-formateur
      - backend-apprenant
      - backend-coordinateur
      - livekit
      - ai-detection-service

volumes:
  certificate_postgres_data:
    external: true
  ollama_data:
  certif_uploads_data:
    external: true


