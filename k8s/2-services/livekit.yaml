apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
data:
  livekit.yaml: |
    port: 7880
    rtc:
      port_range_start: 50000
      port_range_end: 60000
      tcp_port: 7881
    keys:
      devkey: devsecret32charslongtofitrequirement
    logging:
      level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      containers:
      - name: livekit
        image: livekit/livekit-server:latest
        command: ["/livekit-server"]
        args: ["--config", "/etc/livekit.yaml", "--node-ip=$(NODE_IP)"]
        env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        ports:
        - containerPort: 7880
        volumeMounts:
        - name: config-volume
          mountPath: /etc/livekit.yaml
          subPath: livekit.yaml
      volumes:
      - name: config-volume
        configMap:
          name: livekit-config
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-svc
spec:
  selector:
    app: livekit
  ports:
  - name: http
    port: 7880
    targetPort: 7880
  - name: tcp-rtc
    port: 7881
    targetPort: 7881
