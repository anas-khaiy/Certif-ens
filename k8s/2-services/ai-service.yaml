apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-detection-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-detection-service
  template:
    metadata:
      labels:
        app: ai-detection-service
    spec:
      containers:
      - name: ai-service
        image: certiflow-ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-detection-service
spec:
  selector:
    app: ai-detection-service
  ports:
  - port: 8000
    targetPort: 8000
