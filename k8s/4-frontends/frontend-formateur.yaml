apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-formateur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-formateur
  template:
    metadata:
      labels:
        app: service-formateur
    spec:
      containers:
      - name: service-formateur
        image: certiflow-frontend-formateur:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        ports:
        - containerPort: 5174
---
apiVersion: v1
kind: Service
metadata:
  name: service-formateur
spec:
  type: NodePort
  selector:
    app: service-formateur
  ports:
  - port: 5174
    targetPort: 5174
    nodePort: 30174
