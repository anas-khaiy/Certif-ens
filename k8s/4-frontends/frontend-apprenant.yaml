apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-apprenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-apprenant
  template:
    metadata:
      labels:
        app: service-apprenant
    spec:
      containers:
      - name: service-apprenant
        image: certiflow-frontend-apprenant:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        ports:
        - containerPort: 5175
---
apiVersion: v1
kind: Service
metadata:
  name: service-apprenant
spec:
  type: NodePort
  selector:
    app: service-apprenant
  ports:
  - port: 5175
    targetPort: 5175
    nodePort: 30175
