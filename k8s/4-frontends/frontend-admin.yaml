apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-admin
  template:
    metadata:
      labels:
        app: service-admin
    spec:
      containers:
      - name: service-admin
        image: certiflow-frontend-admin:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: service-admin
spec:
  type: NodePort
  selector:
    app: service-admin
  ports:
  - port: 5173
    targetPort: 5173
    nodePort: 30173
