apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-apprenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-apprenant
  template:
    metadata:
      labels:
        app: backend-apprenant
    spec:
      containers:
      - name: backend-apprenant
        image: certiflow-backend-apprenant:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/certif_db
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          value: password
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: backend-apprenant
spec:
  type: NodePort
  selector:
    app: backend-apprenant
  ports:
  - port: 8082
    targetPort: 8082
    nodePort: 30082
