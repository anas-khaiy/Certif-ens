# =============================================================
# CertiFlow - Nginx Production Configuration
# Domain: 192.168.20.25
# =============================================================
# HOW TO USE:
#   sudo cp nginx/certiflow.conf /etc/nginx/sites-available/certiflow
#   sudo ln -sf /etc/nginx/sites-available/certiflow /etc/nginx/sites-enabled/certiflow
#   sudo nginx -t && sudo systemctl restart nginx
# =============================================================

# Set global max body size to allow large image uploads (base64)
client_max_body_size 50M;

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name 192.168.20.25;
    return 301 https://$host$request_uri;
}

# ─── FRONTENDS ────────────────────────────────────────────────

# APPRENANT FRONTEND — Main site (Port 443)
# Vite runs internally on port 6175
server {
    listen 443 ssl;
    server_name 192.168.20.25;

    ssl_certificate /home/anas/projet/Certif-ens/nginx/ssl/self.crt;
    ssl_certificate_key /home/anas/projet/Certif-ens/nginx/ssl/self.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://192.168.20.25:6175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

