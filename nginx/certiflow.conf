# ─── BACKENDS (Spring Boot APIs) ─────────────────────────────

# CORS config for all API backends
map $http_origin $cors_allow_origin {
    "~^https?://(localhost|127\.0\.0\.1|192\.168\..*|10\.10\.10\..*|217\.65\.145\.127)(:[0-9]+)?$" $http_origin;
}

# ADMIN API — Port 84
server {
    listen 84;
    server_name localhost;

    location / {
        set $cors_origin $cors_allow_origin;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Expose-Headers "Set-Cookie, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Expose-Headers "Set-Cookie, Authorization" always;
        proxy_pass http://backend-admin:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

