# ─── BACKENDS (Spring Boot APIs) ─────────────────────────────

# ADMIN API — Port 84
server {
    listen 84;
    server_name localhost;

    location / {
        proxy_pass http://backend-admin:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# FORMATEUR API — Port 85
server {
    listen 85;
    server_name localhost;

    location / {
        proxy_pass http://backend-formateur:9092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# APPRENANT API + WEBSOCKET — Port 86
server {
    listen 86;
    server_name localhost;

    location / {
        proxy_pass http://backend-apprenant:9093;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /ws {
        proxy_pass http://backend-apprenant:9093/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# COORDINATEUR API — Port 87
server {
    listen 87;
    server_name localhost;

    location / {
        proxy_pass http://backend-coordinateur:9094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# AI DETECTION SERVICE — Port 88
server {
    listen 88;
    server_name localhost;

    location / {
        proxy_pass http://ai-detection-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
